name: Build Unsigned IPA (TrollStore / Jailbreak)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      PROJECT_NAME: A3ToA4Splitter
      SCHEME_NAME: A3ToA4Splitter

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build and Archive (ad-hoc, no certificate needed)
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild archive \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME_NAME }} \
            -archivePath build/${{ env.PROJECT_NAME }}.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            2>&1 | tee build/archive-log.txt

      - name: Inspect .app Bundle
        run: |
          APP_PATH=$(find "build/${{ env.PROJECT_NAME }}.xcarchive/Products/Applications" -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            exit 1
          fi

          echo "=== .app path ==="
          echo "$APP_PATH"
          echo "=== .app total size ==="
          du -sh "$APP_PATH"
          echo "=== .app contents ==="
          ls -la "$APP_PATH"
          echo "=== Check for binary ==="
          find "$APP_PATH" -name "A3ToA4Splitter" -type f -exec ls -lh {} \;

      - name: Remove Signature & Package IPA
        run: |
          APP_PATH=$(find "build/${{ env.PROJECT_NAME }}.xcarchive/Products/Applications" -name "*.app" -type d | head -n 1)

          # 移除 ad-hoc 签名（TrollStore 会自己处理签名）
          codesign --remove-signature "$APP_PATH" 2>/dev/null || true
          rm -rf "$APP_PATH/_CodeSignature" 2>/dev/null || true

          # 打包为 IPA（必须包含 Payload/ 根目录）
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          zip -r -y ${{ env.PROJECT_NAME }}.ipa Payload/
          ls -lh ${{ env.PROJECT_NAME }}.ipa

          echo "=== IPA structure ==="
          unzip -l ${{ env.PROJECT_NAME }}.ipa | head -30

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-Unsigned
          path: ${{ env.PROJECT_NAME }}.ipa

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-build-log
          path: build/archive-log.txt
