name: Build Unsigned IPA (TrollStore / Jailbreak)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      PROJECT_NAME: A3ToA4Splitter
      SCHEME_NAME: A3ToA4Splitter

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for iOS (no signature)
        run: |
          set -e
          mkdir -p build
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME_NAME }} \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            2>&1 | tee build/build-log.txt

      - name: Inspect .app Bundle
        run: |
          APP_PATH=$(find "build/DerivedData/Build/Products/Release-iphoneos" -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            echo "=== Searching in DerivedData ==="
            find "build/DerivedData" -name "*.app" -type d 2>/dev/null
            exit 1
          fi

          echo "=== .app path ==="
          echo "$APP_PATH"
          echo "=== .app total size ==="
          du -sh "$APP_PATH"
          echo "=== .app contents ==="
          ls -la "$APP_PATH"
          echo "=== Binary details ==="
          find "$APP_PATH" -name "${{ env.PROJECT_NAME }}" -type f -exec ls -lh {} \;
          find "$APP_PATH" -name "${{ env.PROJECT_NAME }}" -type f -exec file {} \;
          echo "=== Size breakdown ==="
          du -sh "$APP_PATH"/*
          echo "=== Frameworks contents ==="
          if [ -d "$APP_PATH/Frameworks" ]; then
            ls -la "$APP_PATH/Frameworks/"
            du -sh "$APP_PATH/Frameworks/"/*
          else
            echo "No Frameworks directory"
          fi

      - name: Package IPA
        run: |
          APP_PATH=$(find "build/DerivedData/Build/Products/Release-iphoneos" -name "*.app" -type d | head -n 1)

          rm -rf "$APP_PATH/_CodeSignature" 2>/dev/null || true
          rm -rf "$APP_PATH/embedded.mobileprovision" 2>/dev/null || true

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          zip -r ${{ env.PROJECT_NAME }}.ipa Payload/
          ls -lh ${{ env.PROJECT_NAME }}.ipa

          echo "=== IPA structure ==="
          unzip -l ${{ env.PROJECT_NAME }}.ipa | head -40

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-Unsigned
          path: ${{ env.PROJECT_NAME }}.ipa

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-build-log
          path: build/build-log.txt
